---
- name: Create application directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ kopia_root_dir }}"
    - "{{ kopia_root_dir }}/config"
    - "{{ kopia_root_dir }}/cache"
    - "{{ kopia_local_dump_dir }}"
    - "{{ kopia_scripts_dir }}"

- name: Copy docker-compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ kopia_root_dir }}/docker-compose.yml"
    mode: '0644'

- name: Copy .kopiaignore template
  ansible.builtin.template:
    src: ".kopiaignore.j2"
    dest: "{{ item }}/.kopiaignore"
    mode: '0644'
  loop: "{{ kopia_folders_to_save }}"

- name: Verify if kopia is initialized
  ansible.builtin.stat:
    path: "{{ kopia_root_dir }}/config/repository.config"
  register: repository_config_result

- name: Kopia initialization
  community.docker.docker_container:
    image: "kopia/kopia:{{ kopia_image_tag }}"
    name: kopia_init
    pull: true
    state: started
    auto_remove: true
    volumes:
      - "{{ kopia_root_dir }}/config:/app/config"
      - "{{ kopia_root_dir }}/cache:/app/cache:rw"
    env:
      KOPIA_PASSWORD: "{{ kopia_password }}"
    command: >
      repository create s3
      --endpoint={{ kopia_s3_endpoint_url }}
      --bucket={{ kopia_s3_bucket_name }}
      --access-key={{ kopia_s3_access_key_id }}
      --secret-access-key={{ kopia_s3_access_key_secret }}
  when: not repository_config_result.stat.exists
  no_log: true

- name: Kopia policy configuration
  community.docker.docker_container:
    image: "kopia/kopia:{{ kopia_image_tag }}"
    name: kopia_policy_configuration
    pull: true
    state: started
    auto_remove: true
    volumes:
      - "{{ kopia_root_dir }}/config:/app/config"
      - "{{ kopia_root_dir }}/cache:/app/cache:rw"
    env:
      KOPIA_PASSWORD: "{{ kopia_password }}"
    command: >
      policy set --global
      --keep-daily {{ kopia_policy_keep_daily }}
      --keep-weekly {{ kopia_policy_keep_weekly }}
      --keep-monthly {{ kopia_policy_keep_monthly }}
      --compression {{ kopia_policy_compression }}
  no_log: true

- name: Kopia notification configuration
  community.docker.docker_container:
    image: "kopia/kopia:{{ kopia_image_tag }}"
    name: kopia_notifications
    state: started
    auto_remove: true
    volumes:
      - "{{ kopia_root_dir }}/config:/app/config:rw"
    env:
      KOPIA_PASSWORD: "{{ kopia_password }}"
    command: >
      status set
      --email-report=success,failure
      --email-to={{ kopia_email_report_to }}
      --email-from={{ kopia_email_from }}
      --email-smtp-server={{ kopia_smtp_host }}
      --email-smtp-port={{ kopia_smtp_port }}
      --email-smtp-username={{ kopia_smtp_username }}
      --email-smtp-password={{ kopia_smtp_password }}
  when: kopia_email_report_enabled
  no_log: true

- name: Copy kopia backup bash scripts template
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: '0700'
  loop:
    - {src: "pre-backup.sh.j2", dest: "{{ kopia_scripts_dir }}/pre-backup.sh"}
    - {src: "kopia-job.sh.j2", dest: "{{ kopia_scripts_dir }}/kopia-job.sh"}

- name: Copy kopia backup systemd timer service template
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: '0644'
  loop:
    - {src: "kopia-backup.timer.j2", dest: "/etc/systemd/system/kopia-backup.timer"}
    - {src: "kopia-backup.service.j2", dest: "/etc/systemd/system/kopia-backup.service"}

- name: Reload systemd daemon to pick up new units
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: Enable kopia-backup.service
  ansible.builtin.systemd_service:
    name: kopia-backup.service
    enabled: true

- name: Enable and start kopia-backup.timer
  ansible.builtin.systemd_service:
    name: kopia-backup.timer
    state: started
    enabled: true
